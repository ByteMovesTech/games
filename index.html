<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Private Escape Room</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Config and Init -->
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase.js"></script>
</head>
<body>

<div class="container">

  <div id="loginDiv">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <br>
    <input type="password" id="password" placeholder="Password">
    <br>
    <button id="loginBtn">Login</button>
  </div>

  <div id="gameDiv" style="display:none;">
    <h2>Welcome to Your Escape Room</h2>

    <!-- Start a new game -->
    <button id="startBtn">Start New Game</button>
    <br><br>

    <!-- Join existing game -->
    <h3>Join Existing Session</h3>
    <input type="text" id="joinSessionInput" placeholder="Enter session code">
    <button id="joinBtn">Join Session</button>
  </div>

</div>

<script src="js/landing.js"></script>
</body>
</html>
